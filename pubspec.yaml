name: speech_recognition_kvc
description: A flutter plugin to use the speech recognition on iOS and Android
version: 1.0.2
homepage: https://github.com/NeKoFu/speech_recognition_kvc
repository: https://github.com/NeKoFu/speech_recognition_kvc

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"
  
dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.kavacode.speechrecognition
        pluginClass: SpeechRecognitionPlugin
      ios:
        pluginClass: SpeechRecognitionPlugin


